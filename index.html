<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EduKart Remote</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">

<script src="script.js" defer></script>

</head>

<body>

<div class="background"></div>

<div class="container">

<header>

<h1>EduKart Remote</h1>

<p>Wireless Smart Board Controller</p>

</header>

<div class="statusBar">

<div class="wifi">
📶 Connected
</div>

<div class="battery">
🔋100%
</div>

</div>

<div class="touchpad">

<div class="touchText">
Touch Pad
</div>

</div>

<div class="controls">

<button id="home">🏠</button>

<button id="back">⬅</button>

<button id="recent">☰</button>

<button id="up">▲</button>

<button id="left">◀</button>

<button id="ok">OK</button>

<button id="right">▶</button>

<button id="down">▼</button>

<button id="keyboard">⌨</button>

<button id="volumeup">🔊</button>

<button id="volumedown">🔉</button>

<button id="mute">🔇</button>

<button id="mirror">📺</button>

<button id="files">📂</button>

<button id="voice">🎤</button>

<button id="presentation" class="wide">

▶ Presentation Mode

</button>

</div>

<footer>

Designed by <span>Aadi Gupta</span>

</footer>

</div>

</body>

</html>
